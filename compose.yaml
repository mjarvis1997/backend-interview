services:
  api:
    build: ./server
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    environment:
      - MONGODB_URI=mongodb://root:example@mongo:27017/
      - REDIS_URL=redis://redis:6379/0
      - REALTIME_STATS_CACHE_TTL_MINUTES=60
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    profiles: [test]

  workers:
    build: ./server
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    environment:
      - MONGODB_URI=mongodb://root:example@mongo:27017/
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    command: rq worker ingestion_queue --url redis://redis:6379/0 --with-scheduler
    deploy:
      replicas: 10

  rq-dashboard:
    build: ./server
    ports:
      - "9181:9181"
    depends_on:
      - redis
    command: rq-dashboard --redis-url redis://redis:6379/0 --port 9181
    stop_grace_period: 1s
    

  redis:
    image: redis:8.6.1-alpine
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  mongo:
    image: mongo:8.2.6-rc0-noble
    restart: always
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: mongoexpressuser
      ME_CONFIG_BASICAUTH_PASSWORD: mongoexpresspass

  elasticsearch:
    image: elasticsearch:9.3.1
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    mem_limit: 2g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 2s
      timeout: 1s
      retries: 10
      start_period: 10s
